<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pro Dash 2 ULTIMATE</title>
<style>
body{margin:0;background:#050505;color:#fff;font-family:Segoe UI,Arial;text-align:center;overflow:hidden}
#top{display:flex;justify-content:space-between;max-width:820px;margin:8px auto;padding:0 10px}
canvas{border:2px solid #333;border-radius:8px;background:#000;width:95vw;max-width:800px}
button{padding:8px 14px;margin:4px;border:none;border-radius:6px;cursor:pointer;background:#333;color:#fff;font-weight:bold}
#shop,#death{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:10px;width:90%;max-width:500px;margin-bottom:20px}
.item{background:#222;padding:10px;border:2px solid #444;border-radius:6px;cursor:pointer;font-size:12px}
.unlocked{border-color:#0f0}
.equipped{background:#0f0;color:#000}
#boss-warn{position:absolute;top:20%;width:100%;color:red;font-size:30px;display:none;font-weight:bold;animation:blink .5s infinite}
@keyframes blink{50%{opacity:0}}
</style>
</head>
<body>
<div id="top">
<span>💰 <span id="coins">0</span></span>
<span>Score: <span id="score">0</span> | High: <span id="high">0</span></span>
<div>
<button onclick="toggleShop()">Shop</button>
<button onclick="pause()">Pause</button>
</div>
</div>

<div id="boss-warn">BOSS ATTACK!</div>

<div id="death">
<h1 style="color:red">CRASHED</h1>
<p>Score: <span id="finalScore">0</span></p>
<button onclick="resetGame()" style="background:#0f0;color:#000;font-size:20px">RESTART</button>
</div>

<canvas id="c" width="800" height="400"></canvas>

<div id="shop">
<h2>SHOP</h2>
<h3>Skins</h3>
<div class="grid" id="skins"></div>
<h3>Themes</h3>
<div class="grid" id="themes"></div>
<button onclick="toggleShop()">Close</button>
</div>

<script>
const ctx=c.getContext('2d');

let data=JSON.parse(localStorage.getItem('pd2'))||{
 coins:0,high:0,
 skins:['green'],themes:['dark'],
 eqSkin:'green',eqTheme:'dark'
};

const skins=[{id:'green',p:0},{id:'red',p:5},{id:'cyan',p:10},{id:'gold',p:20},{id:'white',p:30}];
const themes=[{id:'dark',c:'#000',p:0},{id:'space',c:'#020024',p:10},{id:'lava',c:'#220000',p:15},{id:'forest',c:'#001a00',p:15}];

let p={x:100,y:300,w:40,h:40,dy:0,j:0};
let obs=[],parts=[],bossAtks=[];
let score=0,speed=6,run=true,frame=0,boss=false,bt=0;

// SOUND
const audio=new (window.AudioContext||window.webkitAudioContext)();
function sfx(f,t,v,type='square'){
 const o=audio.createOscillator(),g=audio.createGain();
 o.type=type;o.frequency.setValueAtTime(f,audio.currentTime);
 g.gain.setValueAtTime(v,audio.currentTime);
 g.gain.exponentialRampToValueAtTime(0.001,audio.currentTime+t);
 o.connect(g);g.connect(audio.destination);o.start();o.stop(audio.currentTime+t);
}

function save(){
 localStorage.setItem('pd2',JSON.stringify(data));
 coins.innerText=data.coins;high.innerText=data.high;
 renderShop();
}

function toggleShop(){shop.style.display=shop.style.display==='flex'?'none':'flex'}

function renderShop(){
 skins.innerHTML='';themes.innerHTML='';
 skins.forEach(s=>skins.appendChild(makeItem(s,data.skins,data.eqSkin,'skin')));
 themes.forEach(t=>themes.appendChild(makeItem(t,data.themes,data.eqTheme,'theme')));
}

function makeItem(it,list,eq,type){
 let d=document.createElement('div');
 let u=list.includes(it.id),e=eq===it.id;
 d.className=`item ${u?'unlocked':''} ${e?'equipped':''}`;
 d.innerText=u?(e?'EQUIPPED':'USE'):it.p+'💰';
 d.onclick=()=>{
  if(u){type==='skin'?data.eqSkin=it.id:data.eqTheme=it.id}
  else if(data.coins>=it.p){data.coins-=it.p;list.push(it.id)}
  save();
 };
 return d;
}

function jump(){
 if(p.j<2){
  p.dy=-15;p.j++;
  sfx(400,0.1,0.1);
  for(let i=0;i<6;i++)parts.push({x:p.x,y:p.y+40,vx:Math.random()*2-1,vy:Math.random()*2,l:20});
 }
}

function pause(){run=!run;if(run)loop()}

function spawnObs(){obs.push({x:850,w:40,h:Math.random()>0.5?40:80,p:0})}

function update(){
 p.dy+=.9;p.y+=p.dy;
 if(p.y>300){p.y=300;p.dy=0;p.j=0}

 if(!boss){
  if(frame%90===0)spawnObs();
  if(score>0 && score%100===0){boss=true;bt=600;bossWarn.style.display='block';setTimeout(()=>bossWarn.style.display='none',2000)}
 }else{
  bt--;if(frame%50===0)bossAtks.push({x:800,y:p.y,w:20,h:20});
  if(bt<=0){boss=false;data.coins+=5;save()}
 }

 obs.forEach((o,i)=>{
  o.x-=speed;
  if(p.x<o.x+o.w&&p.x+p.w>o.x&&p.y+p.h>340-o.h)end();
  if(o.x<-50)obs.splice(i,1);
  if(o.x<p.x&&!o.p){o.p=1;score++;if(score%20===0){data.coins++;save()}}
 });

 bossAtks.forEach((a,i)=>{
  a.x-=10;
  if(p.x<a.x+a.w&&p.x+p.w>a.x&&p.y<a.y+a.h&&p.y+p.h>a.y)end();
  if(a.x<-50)bossAtks.splice(i,1);
 });

 parts.forEach((pt,i)=>{pt.x+=pt.vx;pt.y+=pt.vy;pt.l--;if(pt.l<=0)parts.splice(i,1)});

 speed+=0.001;scoreEl.innerText=score;
}

function draw(){
 let th=themes.find(t=>t.id===data.eqTheme);
 ctx.fillStyle=th?th.c:'#000';ctx.fillRect(0,0,800,400);
 ctx.fillStyle='#222';ctx.fillRect(0,340,800,60);

 parts.forEach(pt=>{ctx.globalAlpha=pt.l/20;ctx.fillStyle='white';ctx.fillRect(pt.x,pt.y,3,3)});
 ctx.globalAlpha=1;

 ctx.fillStyle=data.eqSkin;ctx.fillRect(p.x,p.y,p.w,p.h);
 ctx.strokeStyle='white';ctx.strokeRect(p.x,p.y,p.w,p.h);

 ctx.fillStyle='red';obs.forEach(o=>ctx.fillRect(o.x,340-o.h,o.w,o.h));

 if(boss){
  ctx.fillStyle='#ff0044';ctx.beginPath();ctx.arc(750,150,40+Math.sin(frame*0.1)*10,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='orange';bossAtks.forEach(a=>ctx.fillRect(a.x,a.y,a.w,a.h));
 }
}

function loop(){if(!run)return;update();draw();frame++;requestAnimationFrame(loop)}

function end(){
 run=false;sfx(100,0.5,0.2,'sawtooth');
 finalScore.innerText=score;
 if(score>data.high)data.high=score;
 save();
 death.style.display='flex';
}

function resetGame(){
 score=0;speed=6;obs=[];bossAtks=[];parts=[];frame=0;boss=false;p.y=300;p.dy=0;run=true;
 death.style.display='none';
 save();loop();
}

window.addEventListener('keydown',e=>{if(e.code==='Space')jump()});
c.addEventListener('pointerdown',jump);

const coins=document.getElementById('coins');
const high=document.getElementById('high');
const scoreEl=document.getElementById('score');
const shop=document.getElementById('shop');
const skins=document.getElementById('skins');
const themes=document.getElementById('themes');
const bossWarn=document.getElementById('boss-warn');
const death=document.getElementById('death');
const finalScore=document.getElementById('finalScore');

save();loop();
</script>
</body>
</html>
